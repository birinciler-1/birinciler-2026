<!doctype html><html lang='ar' dir='rtl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'><title>Birinciler</title><link rel='apple-touch-icon' href='birinciler-icon.png'>

<style>
  :root {
    --gold: #C9A84C;
    --gold-bright: #F4C430;
    --gold-dark: #9A7B2E;
    --gold-muted: rgba(201,168,76,0.15);
    --black: #0A0A0A;
    --dark: #111111;
    --dark2: #1A1A1A;
    --dark3: #222222;
    --text: #E8E0CC;
    --text-muted: #8A8070;
    --text-dim: #6A6258;
    --border: rgba(201,168,76,0.25);
    --border-bright: rgba(244,196,48,0.5);
    --shadow-gold: 0 8px 32px rgba(201,168,76,0.15);
    --shadow-dark: 0 8px 40px rgba(0,0,0,0.6);
  }
  
  @keyframes fadeInUp {
    from { opacity:0; transform:translateY(24px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.3); }
    50%      { box-shadow: 0 0 0 6px rgba(201,168,76,0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  *, *::before, *::after { box-sizing: border-box; }
  
  html { background:#0A0A0A; }
  html, body {
    margin: 0;
    font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
    background: #0A0A0A;
    color: #E8E0CC;
    min-height: 100vh;
    direction: rtl;
  }
  
  /* ─── LOGIN ─── */
  .login{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999}
    .login::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 50% 50%,rgba(201,168,76,.08) 0,transparent 60%);pointer-events:none}
    .box{background:linear-gradient(145deg,#111,#0a0a0a);padding:40px 36px;border-radius:24px;border:1px solid var(--border-bright);box-shadow:var(--shadow-dark),var(--shadow-gold),inset 0 1px 0 rgba(255,255,255,.06);width:min(92vw,420px);animation:fadeInUp .6s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
    .box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold-bright),transparent);animation:shimmer 3s ease infinite;background-size:200% auto}
    .login-logo{width:96px;height:auto;display:block;margin:0 auto 16px;border-radius:14px;border:1px solid var(--border);box-shadow:var(--shadow-gold)}
    .box h2{margin:0 0 8px;font-size:26px;font-weight:900;background:linear-gradient(135deg,var(--gold-bright),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center}
    .box p{margin:0 0 24px;color:var(--text-muted);font-size:14px;text-align:center}
    .box input[type=password]{width:100%;padding:14px 18px;border:1.5px solid rgba(201,168,76,0.4);border-radius:14px;font-size:16px;font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;background:#0d0d0d;color:#e8e0cc}
    .box input[type=password]:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.15)}
    .box button{margin-top:16px;width:100%;padding:15px;border:0;border-radius:14px;background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#0A0A0A;font-size:16px;font-weight:800;font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4)}
    .err{color:#FF6B6B;min-height:22px;margin-top:10px;font-size:13px;text-align:center}

  /* ─── MAIN WRAP ─── */
  .wrap { max-width: 1320px; margin: auto; padding: 20px; }

  /* ─── HEADER ─── */
  .top {
    background: linear-gradient(135deg, #1A1508 0%, #111111 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 22px 28px;
    box-shadow: var(--shadow-dark), var(--shadow-gold);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 20px;
    position: relative; overflow: hidden;
    animation: fadeInUp 0.4s ease;
  }
  .top::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .top-logo {
    height: 80px; width: auto; flex-shrink: 0;
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-gold);
  }
  .top-text h1 {
    margin: 0 0 5px;
    font-size: 28px; font-weight: 900;
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .top-text p { margin: 0; color: var(--text-muted); line-height: 1.8; font-size: 14px; }

  .order-btn {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0A0A0A; border: 0;
    border-radius: 12px; padding: 10px 22px;
    font-size: 15px; font-weight: 800;
    font-family: 'Cairo', sans-serif;
    cursor: pointer; margin-right: 12px;
    vertical-align: middle;
    box-shadow: 0 4px 16px rgba(201,168,76,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .order-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.5); }

  /* ─── CONTROLS ─── */
  .controls {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 12px; margin: 16px 0;
  }
  input, select {
    width: 100%; padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 14px; font-size: 15px;
    font-family: 'Cairo', sans-serif;
    background: var(--dark2); color: var(--text);
    box-sizing: border-box;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }
  select option { background: var(--dark2); color: var(--text); }

  /* ─── STATS ─── */
  .stats {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 12px; margin: 14px 0 20px;
  }
  .stat {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 18px; padding: 18px 20px;
    box-shadow: var(--shadow-dark);
    position: relative; overflow: hidden;
    animation: fadeInUp 0.5s ease both;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat:nth-child(1) { animation-delay: 0.05s; }
  .stat:nth-child(2) { animation-delay: 0.1s; }
  .stat:nth-child(3) { animation-delay: 0.15s; }
  .stat:hover { border-color: var(--gold); transform: translateY(-2px); }
  .stat::before {
    content: ''; position: absolute;
    top: 0; left: 0; width: 3px; height: 100%;
    background: linear-gradient(to bottom, var(--gold-bright), var(--gold-dark));
  }
  .stat small { display: block; color: var(--text-muted); margin-bottom: 6px; font-size: 13px; }
  .stat strong { font-size: 24px; font-weight: 900; color: var(--gold-bright); }

  /* ─── GRID & CARDS ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    box-shadow: var(--shadow-dark);
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    animation: fadeInUp 0.4s ease both;
  }
  .card:hover {
    border-color: var(--gold);
    transform: translateY(-4px);
    box-shadow: var(--shadow-dark), var(--shadow-gold);
  }
  .body { padding: 18px; line-height: 1.8; }
  .name {
    font-size: 16px; font-weight: 700;
    min-height: 56px; color: var(--text);
    margin-bottom: 12px;
    line-height: 1.6;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .meta { display: flex; flex-direction: column; gap: 6px; }
  .meta-row { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .meta-label {
    color: var(--text-dim); font-size: 12px;
    min-width: 85px; flex-shrink: 0;
    font-weight: 600; letter-spacing: 0.3px;
  }
  .meta-value { color: var(--text); font-weight: 700; font-size: 14px; }
  .price {
    margin-top: 14px; padding: 12px 16px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.06));
    border: 1px solid var(--border);
    font-weight: 800; color: var(--gold-bright);
    display: flex; justify-content: space-between;
    font-size: 16px;
  }
  .price span:first-child { color: var(--text-muted); font-weight: 600; font-size: 13px; }

  /* ─── ORDER PAGE ─── */
  #orderPage {
    display: none; position: fixed; inset: 0;
    background: var(--black); z-index: 8888;
    overflow-y: auto; direction: rtl;
  }
  .op-wrap { max-width: 960px; margin: auto; padding: 24px; }
  .op-top {
    background: linear-gradient(135deg, #1A1508, #111111);
    border: 1px solid var(--border-bright);
    border-radius: 20px; padding: 20px 28px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: var(--shadow-dark), var(--shadow-gold);
    position: relative; overflow: hidden;
  }
  .op-top::before {
    content: ''; position: absolute; top:0; left:0; right:0; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .op-top h2 { margin: 0; font-size: 22px; font-weight: 900; color: var(--gold-bright); }
  .op-top button {
    background: var(--dark3); color: var(--gold-bright);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 9px 20px; font-size: 14px; font-weight: 700;
    font-family: 'Cairo', sans-serif; cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .op-top button:hover { background: var(--dark2); border-color: var(--gold); }
  
  .op-inputs {
    display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1fr;
    gap: 12px;
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    box-shadow: var(--shadow-dark); margin-bottom: 18px;
  }
  .op-inputs label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--gold); letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .op-inputs input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: 'Cairo', sans-serif;
    background: var(--dark); color: var(--text);
  }
  .op-inputs input:focus {
    outline: none; border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,168,76,0.12);
  }
  .op-inputs input[readonly] { color: var(--text-muted); cursor: default; }
  
  .op-table-wrap {
    background: var(--dark2); border: 1px solid var(--border);
    border-radius: 18px; padding: 20px;
    box-shadow: var(--shadow-dark);
  }
  .op-table-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .op-table-header span { font-weight: 700; font-size: 15px; color: var(--text-muted); }
  .op-table-header span strong { color: var(--gold-bright); font-size: 18px; }
  .op-total-row {
    display: flex; align-items: center; gap: 12px;
    font-size: 16px; color: var(--text-muted); font-weight: 600;
  }
  .op-total-row .total-val {
    color: var(--gold-bright); font-weight: 900; font-size: 18px;
  }
  .op-actions { display: flex; gap: 10px; }
  .btn-del-all {
    background: rgba(176,0,32,0.15); color: #FF6B6B;
    border: 1px solid rgba(176,0,32,0.3); border-radius: 10px;
    padding: 9px 18px; font-size: 13px; font-weight: 700;
    font-family: 'Cairo', sans-serif; cursor: pointer;
    transition: background 0.2s;
  }
  .btn-del-all:hover { background: rgba(176,0,32,0.25); }
  .btn-export {
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #0A0A0A; border: 0; border-radius: 10px;
    padding: 9px 18px; font-size: 13px; font-weight: 800;
    font-family: 'Cairo', sans-serif; cursor: pointer;
    box-shadow: 0 4px 14px rgba(201,168,76,0.3);
    transition: transform 0.15s;
  }
  .btn-export:hover { transform: translateY(-1px); }
  
  table.inv { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.inv th {
    background: rgba(201,168,76,0.08); color: var(--gold);
    padding: 12px 10px; text-align: right;
    font-size: 12px; font-weight: 800; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border); text-transform: uppercase;
  }
  table.inv td {
    padding: 12px 10px; border-bottom: 1px solid rgba(201,168,76,0.07);
    vertical-align: middle; color: var(--text); font-size: 14px;
  }
  table.inv td:nth-child(2) { font-weight: 800; color: var(--gold); }
  table.inv td:nth-child(3) { font-weight: 600; }
  table.inv td:nth-child(6) { font-weight: 800; color: var(--gold-bright); }
  table.inv td:nth-child(7) { font-weight: 800; color: var(--gold-bright); }
  table.inv tr:last-child td { border-bottom: none; }
  table.inv tr:hover td { background: rgba(201,168,76,0.04); }
  
  .btn-del-row {
    background: rgba(176,0,32,0.12); color: #FF6B6B;
    border: 1px solid rgba(176,0,32,0.25); border-radius: 8px;
    padding: 4px 12px; font-size: 12px; cursor: pointer;
    font-family: 'Cairo', sans-serif;
    transition: background 0.2s;
  }
  .btn-del-row:hover { background: rgba(176,0,32,0.22); }
  
  .op-empty {
    text-align: center; padding: 50px 30px;
    color: var(--text-dim); font-size: 15px;
  }
  .op-empty::before {
    content: '📦'; display: block; font-size: 36px; margin-bottom: 12px; opacity: 0.5;
  }
  
  /* ─── RESPONSIVE ─── */
  @media (max-width: 800px) {
    .controls, .stats { grid-template-columns: 1fr; }
    .top-text h1 { font-size: 22px; }
    .op-inputs { grid-template-columns: 1fr 1fr; }
  }

  /* Login logo */
  .login-logo{text-align:center;margin-bottom:22px;}
  .login-logo img{height:88px;width:auto;border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow-gold);}
  /* Card meta tags */
  .meta-tags-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .meta-tag{display:flex;flex-direction:column;gap:3px;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.18);border-radius:10px;padding:8px 11px;}
  .meta-tag .lbl{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:0.3px;}
  .meta-tag .val{font-size:14px;font-weight:700;color:var(--text);}
  .company-badge{display:inline-block;margin:8px 0 4px;background:linear-gradient(135deg,rgba(201,168,76,0.2),rgba(201,168,76,0.06));border:1px solid var(--border-bright);border-radius:20px;padding:3px 14px;font-size:11px;font-weight:800;color:var(--gold);letter-spacing:0.3px;}
  /* Price box in order page */
  .op-price-box{background:rgba(201,168,76,0.07);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;display:flex;flex-direction:column;gap:2px;min-height:45px;justify-content:center;}
  .op-price-box .lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:0.3px;}
  .op-price-box .val{font-size:16px;font-weight:900;color:var(--gold-bright);}

  /* Qty badge */
  .qty-badge{display:flex;align-items:center;justify-content:space-between;margin:8px 0 4px;background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));border:1px solid var(--border-bright);border-radius:12px;padding:6px 14px;}
  .qty-label{font-size:11px;font-weight:700;color:#C9A84C;letter-spacing:0.3px;}
  .qty-val{font-size:16px;font-weight:900;color:#F4C430;}

  .filter-btn{background:transparent;color:var(--gold);border:1.5px solid var(--border-bright);border-radius:12px;padding:10px 18px;font-size:14px;font-weight:800;font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;cursor:pointer;margin-right:8px;transition:all 0.2s;}
  .filter-btn:hover{background:rgba(201,168,76,0.1);}
  .filter-btn.active{background:linear-gradient(135deg,#C9A84C,#9A7B2E);color:#0A0A0A;border-color:transparent;}
</style></head><body><div id="login" class="login">

<script>
var orderRows=[];var hideZero=false;function toggleZeroFilter(){hideZero=!hideZero;var btn=document.getElementById("filterZeroBtn");if(hideZero){btn.textContent="👁 إظهار الكل";btn.classList.add("active");}else{btn.textContent="👁 إخفاء المنتهي";btn.classList.remove("active");}render();}

function normalizeRow(r){
if(Array.isArray(r)) return {"اسم المادة":r[0]||'',"كود":r[1]||'',"باركود":r[2]||'',"عدد التعبئة":Number(r[3])||0,"سعر":Number(r[4])||0,"الشركات":r[5]||''};
return r;
}
function openOrderPage(){document.getElementById('orderPage').style.display='block';document.getElementById('op-code').focus();}
function closeOrderPage(){document.getElementById('orderPage').style.display='none';}
function lookupCode(){
var code=document.getElementById('op-code').value.trim();
var found=data.find(function(x){
return String(x['كود'])===code || String(x['باركود'])===code ||
String(x['كود']).toLowerCase()===code.toLowerCase();
});
document.getElementById('op-name').value=found?(found['اسم المادة']||''):'';
var price=found?parseFloat(found['سعر'])||0:0;
document.getElementById('op-price').value=price||'';
var disp=document.getElementById('op-price-display');
if(disp){
if(found && price){
disp.textContent=price.toLocaleString('en-US')+' د.ع';
disp.style.color='var(--gold-bright)';
} else {
disp.textContent='—';
disp.style.color='var(--text-dim)';
}
}
if(found){document.getElementById('op-inner').value=found['عدد التعبئة']||'';}
}
function updatePrice(){
var code=document.getElementById('op-code').value.trim();
var found=data.find(x=>String(x['كود']).toLowerCase()===code.toLowerCase());
document.getElementById('op-price').value=found?(found['سعر']||''):'';
}
function opKeydown(e,field){
if(e.key!=='Enter')return;
e.preventDefault();
if(field==='code'){document.getElementById('op-qty').focus();}
else if(field==='qty'){document.getElementById('op-inner').focus();}
else if(field==='inner'){addOrderRow();}
}
function addOrderRow(){
var code=document.getElementById('op-code').value.trim();
var name=document.getElementById('op-name').value.trim();
var qty=parseInt(document.getElementById('op-qty').value)||0;
var inner=parseInt(document.getElementById('op-inner').value)||0;
var price=parseFloat(document.getElementById('op-price').value)||0;
if(!code||!name){document.getElementById('op-code').focus();return;}
orderRows.push({code:code,name:name,qty:qty,inner:inner,price:price,total:qty*inner,amount:(qty*inner*price)});
renderOrderTable();
document.getElementById('op-code').value='';
document.getElementById('op-name').value='';
document.getElementById('op-qty').value='';
document.getElementById('op-price-display').textContent='—';
document.getElementById('op-price').value='';
document.getElementById('op-inner').value='';
document.getElementById('op-code').focus();
}
function renderOrderTable(){
var tbody=document.getElementById('op-tbody');
document.getElementById('op-count').textContent=orderRows.length;
document.getElementById('invoice-total').textContent=(orderRows.reduce((s,r)=>s+((r.amount||0)),0)).toLocaleString('en-US')+' د.ع';
if(orderRows.length===0){
document.getElementById('op-empty').style.display='block';
document.getElementById('op-table').style.display='none';
return;
}
document.getElementById('op-empty').style.display='none';
document.getElementById('op-table').style.display='table';
tbody.innerHTML=orderRows.map(function(r,i){
return '<tr><td>'+(i+1)+'</td><td>'+r.code+'</td><td>'+r.name+'</td><td>'+r.qty+'</td><td>'+r.inner+'</td><td>'+r.total+'</td><td>'+ (r.amount||0) +'</td><td><button class="btn-del-row" onclick="deleteRow('+i+')">حذف</button></td></tr>';
}).join('');
}
function deleteRow(i){orderRows.splice(i,1);renderOrderTable();}
function deleteAllRows(){if(orderRows.length&&confirm('هل تريد حذف كل الأصناف؟')){orderRows=[];renderOrderTable();}}
function exportExcel(){
if(!orderRows.length){alert('لا توجد بيانات للتصدير');return;}
var BOM='﻿';
var lines=[];
lines.push(['#','الكود','اسم المادة','عدد الكارتون','داخل الكارتون','اجمالي قطع','سعر القطعة','المبلغ (دع)'].join(','));
for(var i=0;i<orderRows.length;i++){
var r=orderRows[i];
var safeName='"'+String(r.name||'').replace(/"/g,'""')+'"';
lines.push([i+1,r.code||'',safeName,r.qty||0,r.inner||0,r.total||0,r.price||0,r.amount||0].join(','));
}
var csv=BOM+lines.join('\r\n');
var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
if(window.navigator&&window.navigator.msSaveBlob){
window.navigator.msSaveBlob(blob,'order.csv');return;
}
var url=window.URL.createObjectURL(blob);
var a=document.createElement('a');
a.style.display='none';
a.href=url;
a.setAttribute('download','order_birinciler.csv');
document.body.appendChild(a);
a.click();
setTimeout(function(){
document.body.removeChild(a);
window.URL.revokeObjectURL(url);
},500);
}
</script>

</body>
</html>
