الشركات']].join(' ').toLowerCase().includes(s));if(c!=='all')list=list.filter(x=>(x['الشركات']||'')===c);if(o==='asc')list.sort((a,b)=>(a['سعر']||0)-(b['سعر']||0));if(o==='desc')list.sort((a,b)=>(b['سعر']||0)-(a['سعر']||0));document.getElementById('count').textContent=list.length;document.getElementById('min').textContent=list.length?fmt(Math.min(...list.map(x=>x['سعر']||0))):'0';document.getElementById('max').textContent=list.length?fmt(Math.max(...list.map(x=>x['سعر']||0))):'0';grid.innerHTML=list.map(x=>'<div class="card"><div class="body"><div class="name">'+(x['اسم المادة']||'')+'</div><div class="meta">الكود: '+(x['كود']||'')+'<br>الباركود: '+(x['باركود']||'')+'<br>عدد التعبئة: '+(x['عدد التعبئة']||'')+'<br>الشركة: '+(x['الشركات']||'')+'</div><div class="price"><span>السعر</span><span>'+fmt(x['سعر'])+'</span></div></div></div>').join('');}[q,company,sort].forEach(el=>el.addEventListener('input',render));render();}if(sessionStorage.getItem('birinciler_auth')==='1'){document.getElementById('login').style.display='none';document.getElementById('site').style.display='block';init();}document.getElementById('code').addEventListener('keydown',e=>{if(e.key==='Enter')openSite();});</script></body></html>
