.top-logo{height:80px;width:auto;flex-shrink:0;border-radius:10px}
.top-text h1{margin:0 0 4px;font-size:30px;color:#f4c430}
.top-text p{margin:0;opacity:.9;line-height:1.8;color:#fff}.controls{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin:16px 0}input,select{width:100%;padding:14px 16px;border:1px solid #ddd;border-radius:14px;font-size:16px;background:#fff;box-sizing:border-box}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:14px 0 18px}.stat{background:#fff;border:1px solid #e4ddd4;border-radius:18px;padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.05)}.stat small{display:block;color:#666;margin-bottom:6px}.stat strong{font-size:26px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}.card{background:#fff;border:1px solid #e4ddd4;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.06)}.body{padding:16px;line-height:2}.name{font-size:19px;font-weight:bold;min-height:62px;color:#111;margin-bottom:10px}.meta{margin-top:8px;display:flex;flex-direction:column;gap:5px}.meta-row{display:flex;align-items:center;gap:6px;font-size:15px}.meta-label{color:#888;font-size:13px;min-width:90px;flex-shrink:0}.meta-value{color:#222;font-weight:600;font-size:15px}.price{margin-top:12px;padding:12px 14px;border-radius:12px;background:#f0f8f2;border:1.5px solid #8eb49a;font-weight:bold;color:#1f5c2d;display:flex;justify-content:space-between;font-size:16px}@media(max-width:800px){.controls,.stats{grid-template-columns:1fr}.top h1{font-size:28px}}
.order-btn{background:#f4c430;color:#1a1a1a;border:0;border-radius:12px;padding:10px 22px;font-size:15px;font-weight:bold;cursor:pointer;margin-right:12px;vertical-align:middle;box-shadow:0 3px 8px rgba(0,0,0,.2)}.order-btn:hover{background:#e0b020}
#orderPage{display:none;position:fixed;inset:0;background:#f4f1ea;z-index:8888;overflow-y:auto;direction:rtl}
.op-wrap{max-width:900px;margin:auto;padding:20px}
.op-top{background:#2f6f3e;color:#fff;border-radius:22px;padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.op-top h2{margin:0;font-size:24px}
.op-top button{background:#f4c430;color:#1a1a1a;border:0;border-radius:10px;padding:8px 18px;font-size:14px;font-weight:bold;cursor:pointer}
.op-inputs{display:grid;grid-template-columns:1fr 2fr 1fr 1fr;gap:10px;background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.07);margin-bottom:16px}
.op-inputs label{display:block;font-size:12px;color:#666;margin-bottom:4px}
.op-inputs input{width:100%;padding:12px;border:1.5px solid #ddd;border-radius:10px;font-size:16px;box-sizing:border-box}
.op-inputs input:focus{border-color:#2f6f3e;outline:none}
.op-table-wrap{background:#fff;border-radius:18px;padding:18px;box-shadow:0 6px 18px rgba(0,0,0,.07)}
.op-table-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.op-table-header span{font-weight:bold;font-size:16px}
.op-actions{display:flex;gap:8px}
.btn-del-all{background:#b00020;color:#fff;border:0;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
.btn-export{background:#2f6f3e;color:#fff;border:0;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer}
table.inv{width:100%;border-collapse:collapse;font-size:15px}
table.inv th{background:#e8f5ee;color:#1f5c2d;padding:12px 10px;text-align:right;font-size:14px;border-bottom:2px solid #b8dbc8;font-weight:700}
table.inv td{padding:12px 10px;border-bottom:1px solid #eee;vertical-align:middle;color:#1a1a1a;font-size:15px}
table.inv td:nth-child(2){font-weight:700;color:#2f6f3e}
table.inv td:nth-child(3){font-weight:600}
table.inv td:nth-child(6){font-weight:700;color:#1f5c2d}
table.inv tr:last-child td{border-bottom:none}
table.inv tr:hover td{background:#f8fdf9}
.btn-del-row{background:#ffecec;color:#b00020;border:1px solid #f4c0c0;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer}
.op-empty{text-align:center;padding:30px;color:#aaa;font-size:15px}

<div class="op-wrap">
  <div class="op-top">
    <h2>📋 صفحة الطلبية</h2>
    <button onclick="closeOrderPage()">← رجوع</button>
  </div>
  <div class="op-inputs">
    <div>
      <label>كود المادة</label>
      <input id="op-code" type="text" placeholder="أدخل الكود" oninput="lookupCode()" onkeydown="opKeydown(event,'code')">
    </div>
    <div>
      <label>اسم المادة</label>
      <input id="op-name" type="text" placeholder="سيظهر تلقائياً" readonly onkeydown="opKeydown(event,'name')">
    </div>
    <div>
      <label>عدد الكارتون</label>
      <input id="op-qty" type="number" min="1" placeholder="0" onkeydown="opKeydown(event,'qty')">
    </div>
    <div>
      <label>داخل الكارتون</label>
      <input id="op-inner" type="number" min="1" placeholder="0" onkeydown="opKeydown(event,'inner')">
    </div>
  </div>
  <div class="op-table-wrap">
    <div class="op-table-header">
      <span>الأصناف المضافة: <strong id="op-count">0</strong></span>
      <div class="op-actions">
        <button class="btn-del-all" onclick="deleteAllRows()">🗑 حذف الكل</button>
        <button class="btn-export" onclick="exportExcel()">⬇ تصدير CSV</button>
      </div>
    </div>
    <div id="op-table-container">
      <div class="op-empty" id="op-empty">لا توجد أصناف مضافة بعد</div>
      <table class="inv" id="op-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>الكود</th>
            <th>اسم المادة</th>
            <th>عدد الكارتون</th>
            <th>داخل الكارتون</th>
            <th>الإجمالي</th>
            <th>حذف</th>
          </tr>
        </thead>
        <tbody id="op-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>
<script>
var orderRows=[];

function normalizeRow(r){
  if(Array.isArray(r)) return {"اسم المادة":r[0]||'',"كود":r[1]||'',"باركود":r[2]||'',"عدد التعبئة":Number(r[3])||0,"سعر":Number(r[4])||0,"الشركات":r[5]||''};
  return r;
}
function openOrderPage(){document.getElementById('orderPage').style.display='block';document.getElementById('op-code').focus();}
function closeOrderPage(){document.getElementById('orderPage').style.display='none';}
function lookupCode(){
  var code=document.getElementById('op-code').value.trim();
  var found=data.find(x=>String(x['كود']).toLowerCase()===code.toLowerCase());
  document.getElementById('op-name').value=found?(found['اسم المادة']||''):'';
  if(found){document.getElementById('op-inner').value=found['عدد التعبئة']||'';}
}
function opKeydown(e,field){
  if(e.key!=='Enter')return;
  e.preventDefault();
  if(field==='code'){document.getElementById('op-qty').focus();}
  else if(field==='qty'){document.getElementById('op-inner').focus();}
  else if(field==='inner'){addOrderRow();}
}
function addOrderRow(){
  var code=document.getElementById('op-code').value.trim();
  var name=document.getElementById('op-name').value.trim();
  var qty=parseInt(document.getElementById('op-qty').value)||0;
  var inner=parseInt(document.getElementById('op-inner').value)||0;
  if(!code||!name){document.getElementById('op-code').focus();return;}
  orderRows.push({code:code,name:name,qty:qty,inner:inner,total:qty*inner});
  renderOrderTable();
  document.getElementById('op-code').value='';
  document.getElementById('op-name').value='';
  document.getElementById('op-qty').value='';
  document.getElementById('op-inner').value='';
  document.getElementById('op-code').focus();
}
function renderOrderTable(){
  var tbody=document.getElementById('op-tbody');
  document.getElementById('op-count').textContent=orderRows.length;
  if(orderRows.length===0){
    document.getElementById('op-empty').style.display='block';
    document.getElementById('op-table').style.display='none';
    return;
  }
  document.getElementById('op-empty').style.display='none';
  document.getElementById('op-table').style.display='table';
  tbody.innerHTML=orderRows.map(function(r,i){
    return '<tr><td>'+(i+1)+'</td><td>'+r.code+'</td><td>'+r.name+'</td><td>'+r.qty+'</td><td>'+r.inner+'</td><td>'+r.total+'</td><td><button class="btn-del-row" onclick="deleteRow('+i+')">حذف</button></td></tr>';
  }).join('');
}
function deleteRow(i){orderRows.splice(i,1);renderOrderTable();}
function deleteAllRows(){if(orderRows.length&&confirm('هل تريد حذف كل الأصناف؟')){orderRows=[];renderOrderTable();}}
function exportExcel(){
  if(!orderRows.length){alert('لا توجد بيانات للتصدير');return;}
  var BOM='\uFEFF';
  var header=['#','الكود','اسم المادة','عدد الكارتون','داخل الكارتون','الإجمالي'].join(',');
  var rows=orderRows.map(function(r,i){return [i+1,r.code,'"'+r.name.replace(/"/g,'""')+'"',r.qty,r.inner,r.total].join(',');});
  var csv=BOM+header+'\n'+rows.join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='طلبية_birinciler.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
</script>
</body></html>
